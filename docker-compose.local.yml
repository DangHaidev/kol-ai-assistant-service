services:
  postgres:
    image: postgres:16-alpine
    container_name: kol-ai-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kol_booking
      POSTGRES_USER: kol_user
      POSTGRES_PASSWORD: kol_secret
    ports:
      - "5433:5432"
    volumes:
      - kol_ai_local_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kol_user -d kol_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://kol_user:kol_secret@postgres:5432/kol_booking
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kol_ai_local_postgres_data:
